<!-- External libraries for PDF / Excel export (CDN <script src> tags are permitted in the HTML field) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link
	href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
	rel="stylesheet">

<div class="csj">
	<div class="wrap">

		<header class="top">
			<div class="brand">
				<span class="badge">
					<svg viewBox="0 0 512 512" fill="#c0392f" aria-hidden="true">
						<path
							d="M256 12l29.6 55.2c3.3 6.2 9.8 4.9 16.3 1.2l21.4-11.1-15.6 82.9c-3.3 15.6 7.4 15.6 12.8 8.9l37.3-41.7 12.1 28.3c1.4 3.3 5 2.8 9.6 1.9l47.1-9.9-15.3 55.6c-2 7.4-1.4 10.4 4.1 12.4l16.6 7.8-80.2 65.1c-4 3.3-2.5 6.6-1.1 11.9l7 23-78.2-6.6c-4.7 0-7.9 2.5-7.8 8.2l2.4 80.7h-23.7l2.4-80.7c.1-5.7-3.1-8.2-7.8-8.2l-78.2 6.6 7-23c1.4-5.3 2.9-8.6-1.1-11.9l-80.2-65.1 16.6-7.8c5.5-2 6.1-5 4.1-12.4l-15.3-55.6 47.1 9.9c4.6.9 8.2 1.4 9.6-1.9l12.1-28.3 37.3 41.7c5.4 6.7 16.1 6.7 12.8-8.9l-15.6-82.9 21.4 11.1c6.5 3.7 13 5 16.3-1.2z" />
					</svg>
					Daily Supervision Log
				</span>
				<h1>Daily <span class="thin">Supervision</span> Log</h1>
			</div>
			<div class="top-actions">
				<div class="theme-toggle" id="themeToggle">
					<button type="button" data-theme="light" class="on" title="Light theme"
						aria-label="Light theme"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
							stroke-width="2">
							<circle cx="12" cy="12" r="4" />
							<path
								d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
						</svg></button>
					<button type="button" data-theme="dark" title="Dark theme" aria-label="Dark theme"><svg
							viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" />
						</svg></button>
				</div>
				<button class="btn ghost" id="exportBtn" title="Export to PDF, Excel or JSON">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />
					</svg>
					Export
				</button>
				<button class="btn ghost hide-ro" id="importBtn" title="Restore from a JSON backup">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
						<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 9l5-5 5 5M12 4v12" />
					</svg>
					Import
				</button>
				<input type="file" id="importFile" accept="application/json" hidden>
			</div>
		</header>

		<section class="dossier" id="dossier"></section>

		<nav class="tabs" id="tabs">
			<button class="tab active" data-tab="overview"><span class="dot"></span>Overview</button>
			<button class="tab" data-tab="records"><span class="dot sup"></span>Daily Supervision <span class="ct"
					id="ctRec">0</span></button>
		</nav>

		<section class="view active" id="view-overview"></section>

		<section class="view" id="view-records">
			<div class="view-head">
				<div class="lede">
					<h2>Daily Supervision Records</h2>
					<p>Day-to-day observations and feedback entered by the <b>supervisor</b>.</p>
				</div>
				<div class="toolbar">
					<button class="btn sm ghost" id="toggleAll" data-state="collapsed"
						title="Expand or collapse all">Expand all</button>
					<div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<circle cx="11" cy="11" r="7" />
							<path d="M21 21l-4-4" />
						</svg><input type="search" id="searchRec" placeholder="Search supervision…"></div>
					<button class="btn sup hide-ro" id="addRec"><svg viewBox="0 0 24 24" fill="none"
							stroke="currentColor" stroke-width="2.2">
							<path d="M12 5v14M5 12h14" />
						</svg>New entry</button>
				</div>
			</div>
			<div class="stream" id="stream"></div>
		</section>

		<div class="foot">
			<span class="mono" id="recMeta"></span>
			<span class="mono" id="savedAt"></span>
		</div>
	</div>

	<div class="csj-overlay" id="overlay">
		<div class="modal" id="modal">
			<div class="modal-head">
				<div>
					<div class="eyebrow" id="mEyebrow"></div>
					<h3 id="mTitle"></h3>
				</div>
				<button class="icon-btn" id="mClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
						stroke-width="2">
						<path d="M18 6L6 18M6 6l12 12" />
					</svg></button>
			</div>
			<div class="modal-body" id="mBody"></div>
			<div class="modal-foot">
				<button class="btn ghost" id="mCancel">Cancel</button>
				<button class="btn primary" id="mSave">Save record</button>
			</div>
		</div>
	</div>
</div>
