<!-- ── Top Tab Bar ── -->
<div id="topbar">
  <div class="topbar-brand">🏭 Warehouse Manager</div>
  <div class="topbar-tabs" id="topbarTabs">
    <button class="tb-tab active" data-tab="products">📦 Products</button>
    <button class="tb-tab" data-tab="warehouses">🏗️ Warehouses</button>
    <button class="tb-tab" data-tab="inventory">📊 Inventory</button>
    <button class="tb-tab" data-tab="invoices">🧾 Invoices</button>
    <button class="tb-tab" data-tab="info">ℹ️ Data Info</button>
  </div>
  <div class="topbar-actions">
    <span class="size-indicator" id="sizeIndicator" title="Document size"></span>
    <span class="readonly-badge" id="readonlyBadge" style="display:none">🔒 Read Only</span>
  </div>
</div>

<!-- ── Main Content ── -->
<div id="mainContent"></div>

<!-- ── Modal Overlay ── -->
<div id="modalOverlay" class="modal-overlay" style="display:none">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<!-- ── Confirm Dialog ── -->
<div id="confirmOverlay" class="modal-overlay" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span class="modal-title">Confirm</span>
      <button class="modal-close" id="confirmClose">✕</button>
    </div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-footer" id="confirmFooter"></div>
  </div>
</div>

<!-- ── Toast Container ── -->
<div id="toastContainer"></div>
