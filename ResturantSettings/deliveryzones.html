<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />

<div class="zones-tool">
  <div class="zones-layout">
    <div class="zones-map-side">
      <div id="delivery-map"></div>
      <div class="map-toolbar">
        <button type="button" class="btn btn-sm btn-outline" id="draw-polygon">▭ Draw Polygon</button>
        <button type="button" class="btn btn-sm btn-outline" id="draw-circle">⊙ Draw Circle</button>
        <button type="button" class="btn btn-sm btn-outline" id="draw-rectangle">▬ Draw Rectangle</button>
        <button type="button" class="btn btn-sm btn-outline" id="edit-layers">✎ Edit Layers</button>
        <button type="button" class="btn btn-sm btn-ghost" id="clear-drawing">✕ Clear Drawing</button>
      </div>
    </div>
    <div class="zones-list-side">
      <h4 class="panel-title">Delivery Zones</h4>
      <div id="zones-list"></div>
      <div class="zone-form" id="zone-form" style="display:none;">
        <div class="form-group">
          <label class="form-label">Zone Name</label>
          <input type="text" class="form-input" id="zone-name" placeholder="e.g. Downtown">
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <input type="color" class="form-input" id="zone-color" value="#4f46e5">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Min. Order ($)</label>
            <input type="number" class="form-input" id="zone-min-order" min="0" step="0.01" value="0">
          </div>
          <div class="form-group">
            <label class="form-label">Delivery Fee ($)</label>
            <input type="number" class="form-input" id="zone-fee" min="0" step="0.01" value="0">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-primary btn-sm" id="save-zone">Save Zone</button>
          <button type="button" class="btn btn-ghost btn-sm" id="cancel-zone">Cancel</button>
        </div>
      </div>
      <button type="button" class="btn btn-outline btn-sm btn-full" id="add-zone-btn">+ New Zone From Drawing</button>
    </div>
  </div>
</div>

<div class="save-bar" id="save-bar">
  <span class="save-status" id="save-status">All changes saved</span>
  <button type="button" class="btn btn-primary btn-sm" id="save-all-btn">Save All</button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
