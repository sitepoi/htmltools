body { padding-top: 32px !important; margin: 0; }

#th-bar button { border: none; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-family: system-ui; font-weight: 600; }
#th-bar .btn-load { background: #0d9488; color: #fff; }
#th-bar .btn-clear { background: #dc2626; color: #fff; }
#th-bar .btn-reload { background: #16a34a; color: #fff; }
#th-bar .btn-toggle-ro { background: #d97706; color: #fff; }
#th-bar .btn-toggle-role { background: #7c3aed; color: #fff; }
#th-bar .btn-dump { background: #2563eb; color: #fff; }
#th-bar .hint { color: #64748b; font-size: 10px; }
@keyframes toolFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

</head>

<div id="app-container"></div>

<script>
/* ── Mock tool SDK with requestObjects + getPermittedUsers ── */
(function() {
  var STORAGE_KEY = 'ptm_test_db';
  var OBJ_STORAGE_KEY = 'ptm_test_objects';
  var listeners = { valueChange: [], fieldsChange: [], readonlyChange: [], userChange: [], permittedUsersChange: [] };
  var _readOnly = false;
  var _user = { id: 'manager-1', name: 'Sarah Chen', email: 'sarah@example.org', roles: ['manager', 'staff'] };
  var _fields = {}, _value = null;
  var MANAGER_USER = { id: 'manager-1', name: 'Sarah Chen', email: 'sarah@example.org', roles: ['manager', 'staff'] };
  var STAFF_USER = { id: 'staff-1', name: 'Alex Rivera', email: 'alex@example.org', roles: ['staff'] };
  var _isManager = true;
  var _permittedUsers = [
    { id: 'manager-1', name: 'Sarah Chen', email: 'sarah@example.org', roles: ['manager', 'staff'] },
    { id: 'staff-1', name: 'Alex Rivera', email: 'alex@example.org', roles: ['staff'] },
    { id: 'staff-2', name: 'Jordan Kim', email: 'jordan@example.org', roles: ['staff'] }
  ];

  function load() {
    try { var raw = localStorage.getItem(STORAGE_KEY); _value = raw ? JSON.parse(raw) : null; }
    catch(e) { _value = null; }
  }
  function save(v) { _value = v; try { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); } catch(e) {} }

  function loadObjects() {
    try { var raw = localStorage.getItem(OBJ_STORAGE_KEY); return raw ? JSON.parse(raw) : { taskSprints: [], taskItems: [] }; }
    catch(e) { return { taskSprints: [], taskItems: [] }; }
  }
  function saveObjects(objs) {
    try { localStorage.setItem(OBJ_STORAGE_KEY, JSON.stringify(objs)); } catch(e) {}
  }

  function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function nowISO() { return new Date().toISOString(); }

  function requestObjects(action, params, cb) {
    setTimeout(function () {
      var objs = loadObjects();
      var type = params.mainObjectType;
      if (!objs[type]) objs[type] = [];

      switch (action) {
        case 'query':
          var list = params.typeId
            ? objs[type].filter(function (o) { return o.typeId === params.typeId; })
            : objs[type].slice();
          cb(null, { objects: list });
          break;
        case 'get':
          var found = null;
          for (var i = 0; i < objs[type].length; i++) {
            if (objs[type][i]._id === params.objectId || objs[type][i].id === params.objectId) {
              found = objs[type][i]; break;
            }
          }
          cb(null, { object: found || null });
          break;
        case 'create':
          var newObj = {
            _id: genId(), id: genId(), name: params.name || "",
            cmsObjectType: type, typeId: params.typeId || "default",
            productData: params.productData || { data_categoriesBased: {} },
            created: nowISO(), updated: nowISO()
          };
          objs[type].push(newObj);
          saveObjects(objs);
          cb(null, { object: newObj });
          break;
        case 'update':
          var updated = false;
          for (var j = 0; j < objs[type].length; j++) {
            if (objs[type][j]._id === params.objectId || objs[type][j].id === params.objectId) {
              if (params.name !== undefined) objs[type][j].name = params.name;
              if (params.productData) {
                if (!objs[type][j].productData) objs[type][j].productData = {};
                if (!objs[type][j].productData.data_categoriesBased) objs[type][j].productData.data_categoriesBased = {};
                Object.assign(objs[type][j].productData.data_categoriesBased, params.productData.data_categoriesBased || {});
              }
              objs[type][j].updated = nowISO();
              updated = true; break;
            }
          }
          saveObjects(objs);
          cb(null, { ok: updated });
          break;
        case 'delete':
          objs[type] = objs[type].filter(function (o) {
            return o._id !== params.objectId && o.id !== params.objectId;
          });
          saveObjects(objs);
          cb(null, { ok: true });
          break;
        case 'batch':
          var ops = params.operations || [];
          var results = [], failed = null;
          (function processNext(idx) {
            if (idx >= ops.length) {
              saveObjects(objs);
              if (failed) cb(failed, null);
              else cb(null, { ok: true, results: results });
              return;
            }
            var op = ops[idx];
            requestObjects(op.action, {
              mainObjectType: op.mainObjectType, typeId: op.typeId,
              objectId: op.objectId, name: op.name, productData: op.productData
            }, function (err2, result2) {
              if (err2 && !failed) failed = err2;
              results.push(result2);
              processNext(idx + 1);
            });
          })(0);
          return;
        default:
          cb("Unknown action: " + action, null);
      }
    }, 50);
  }

  function generateSampleData() {
    var objs = loadObjects();
    var sprintId = 'sprint-' + genId();
    objs.taskSprints = [{
      _id: sprintId, id: sprintId, name: "Sprint 1 — Onboarding",
      cmsObjectType: "taskSprints-uniconbaseapps", typeId: "default",
      productData: { data_categoriesBased: {
        startDate: "2026-06-15", endDate: "2026-06-30",
        managerId: "manager-1", goal: "Successfully onboard new team members and complete first sprint deliverables",
        status: "active"
      }},
      created: nowISO(), updated: nowISO()
    }];

    var sampleTasks = [
      { title: "Complete new hire paperwork", status: "done", priority: "high", assignedTo: "staff-1", assigneeName: "Alex Rivera", dueDate: "2026-06-18", notes: "All forms submitted to HR", labels: ["hr", "onboarding"] },
      { title: "Set up development environment", status: "done", priority: "high", assignedTo: "staff-1", assigneeName: "Alex Rivera", dueDate: "2026-06-19", notes: "VS Code, Node.js, Docker installed", labels: ["dev", "setup"] },
      { title: "Review team handbook", status: "inProgress", priority: "medium", assignedTo: "staff-1", assigneeName: "Alex Rivera", dueDate: "2026-06-25", notes: "Pages 1-45 completed", labels: ["docs"] },
      { title: "Shadow senior developer", status: "inProgress", priority: "medium", assignedTo: "staff-1", assigneeName: "Alex Rivera", dueDate: "2026-06-28", labels: ["training"] },
      { title: "Complete security awareness training", status: "todo", priority: "critical", assignedTo: "staff-1", assigneeName: "Alex Rivera", dueDate: "2026-06-30", notes: "Mandatory compliance training", labels: ["security", "compliance"] },
      { title: "Prepare onboarding presentation", status: "todo", priority: "medium", assignedTo: "manager-1", assigneeName: "Sarah Chen", dueDate: "2026-06-20", notes: "For next new hire cohort", labels: ["docs", "presentation"] },
      { title: "Update documentation for API v2", status: "inProgress", priority: "high", assignedTo: "staff-2", assigneeName: "Jordan Kim", dueDate: "2026-06-22", labels: ["docs", "api"] },
      { title: "Fix login page accessibility issues", status: "blocked", priority: "high", assignedTo: "staff-2", assigneeName: "Jordan Kim", dueDate: "2026-06-24", notes: "Waiting for design team mockups", labels: ["bug", "accessibility"] },
      { title: "Write unit tests for payment module", status: "todo", priority: "medium", assignedTo: "staff-2", assigneeName: "Jordan Kim", dueDate: "2026-06-29", labels: ["dev", "testing"] },
      { title: "Sprint retro preparation", status: "todo", priority: "low", assignedTo: "manager-1", assigneeName: "Sarah Chen", dueDate: "2026-06-30", notes: "Collect feedback from team", labels: ["process"] }
    ];

    objs.taskItems = sampleTasks.map(function (t) {
      var tid = 'task-' + genId();
      return {
        _id: tid, id: tid, name: t.title, cmsObjectType: "taskItems-uniconbaseapps", typeId: "default",
        productData: { data_categoriesBased: {
          title: t.title, description: "", status: t.status,
          assignedTo: t.assignedTo, assigneeName: t.assigneeName, assigneeEmail: "",
          sprintId: sprintId, priority: t.priority, dueDate: t.dueDate,
          completedAt: t.status === "done" ? nowISO() : "", notes: t.notes || "",
          labels: t.labels || [], attachments: [], links: []
        }},
        created: nowISO(), updated: nowISO()
      };
    });

    saveObjects(objs);
    save({ selectedSprintId: sprintId, _theme: "light" });
    return sprintId;
  }

  window.tool = {
    getValue: function() { return _value; },
    setValue: function(data) { save(data); listeners.valueChange.forEach(function(cb) { try { cb(data); } catch(e) {} }); },
    onValueChange: function(cb) { listeners.valueChange.push(cb); },
    getFields: function() { return Object.assign({}, _fields); },
    setField: function(id, value) { _fields[id] = value; },
    setFields: function(obj) { Object.assign(_fields, obj); },
    watchField: function(id, cb) { listeners.fieldsChange.push(cb); },
    onFieldsChange: function(cb) { listeners.fieldsChange.push(cb); },
    param: function(name, fallback) {
      var p = (new URLSearchParams(window.location.search)).get(name);
      return p !== null && p !== '' ? p : fallback;
    },
    isReadOnly: function() { return _readOnly; },
    onReadonlyChange: function(cb) { listeners.readonlyChange.push(cb); },
    _setReadOnly: function(v) {
      _readOnly = v;
      document.getElementById('th-status').textContent = (v ? 'READ-ONLY' : 'EDIT MODE') + ' (' + (_isManager ? 'Manager' : 'Staff') + ')';
      listeners.readonlyChange.forEach(function(cb) { try { cb(v); } catch(e) {} });
    },
    getUser: function() { return _user; },
    onUserChange: function(cb) { listeners.userChange.push(cb); },
    _setUser: function(u) {
      _user = u;
      _isManager = !!(u.roles && (u.roles.indexOf('manager') > -1 || u.roles.indexOf('admin') > -1));
      document.getElementById('th-status').textContent = (_readOnly ? 'READ-ONLY' : 'EDIT MODE') + ' (' + (_isManager ? 'Manager' : 'Staff') + ')';
      listeners.userChange.forEach(function(cb) { try { cb(u); } catch(e) {} });
    },
    reportValid: function(bool, msg) { if (!bool) console.warn('[Validation]', msg); },
    notify: function(message, severity) {
      severity = severity || 'info';
      var colors = { info: '#0d9488', success: '#16a34a', warning: '#d97706', error: '#dc2626' };
      var toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;background:' + (colors[severity] || '#333') + ';color:#fff;padding:10px 20px;border-radius:6px;font-family:system-ui;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:toolFadeIn .3s ease;max-width:400px;';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(function() { toast.remove(); }, 300); }, 2500);
    },
    resize: function() {},
    declareOutput: function() {},
    declareParams: function() {},
    getPermittedUsers: function() { return _permittedUsers.slice(); },
    onPermittedUsersChange: function(cb) { listeners.permittedUsersChange.push(cb); },
    requestObjects: requestObjects,
    onReady: function(cb) {
      load();
      document.getElementById('th-status').textContent = (_readOnly ? 'READ-ONLY' : 'EDIT MODE') + ' (' + (_isManager ? 'Manager' : 'Staff') + ')';
      cb(_value, _fields);
    },
    _loadSampleData: function() {
      generateSampleData();
      window.location.reload();
    },
    _clearData: function() {
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(OBJ_STORAGE_KEY);
      window.location.reload();
    },
    _toggleReadOnly: function() { this._setReadOnly(!_readOnly); },
    _toggleRole: function() {
      this._setUser(_isManager ? STAFF_USER : MANAGER_USER);
      window.tool.notify('Switched to ' + (_isManager ? 'Manager' : 'Staff') + ' view', 'info');
      window.location.reload();
    },
    _dump: function() {
      console.log('PTM UI State:', JSON.parse(JSON.stringify(_value || {})));
      console.log('PTM Objects:', loadObjects());
      console.log('Current user:', JSON.parse(JSON.stringify(_user)));
    }
  };

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'R') { e.preventDefault(); window.tool._toggleReadOnly(); }
    if (e.ctrlKey && e.shiftKey && e.key === 'D') { e.preventDefault(); window.tool._dump(); window.tool.notify('DB dumped to console', 'info'); }
  });
})();
</script>

document.getElementById('th-load-sample').addEventListener('click', function() {

    window.tool._loadSampleData();
  }
});
document.getElementById('th-clear').addEventListener('click', function() {
  if (confirm('Clear ALL data? This cannot be undone.')) {
    window.tool._clearData();
  }
});
document.getElementById('th-reload').addEventListener('click', function() {
  window.location.reload();
});
document.getElementById('th-ro').addEventListener('click', function() {
  window.tool._toggleReadOnly();
});
document.getElementById('th-role').addEventListener('click', function() {
  window.tool._toggleRole();
});
document.getElementById('th-dump').addEventListener('click', function() {
  window.tool._dump();
  window.tool.notify('DB dumped to console (F12)', 'info');
});
