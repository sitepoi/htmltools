<script>
/* ── Mock tool SDK ── */
(function() {
  var STORAGE_KEY = 'grant_planner_test_db';
  var listeners = { valueChange: [], fieldsChange: [], readonlyChange: [], userChange: [] };
  var _readOnly = false, _user = null, _fields = {}, _value = null;

  function load() {
    try { var raw = localStorage.getItem(STORAGE_KEY); _value = raw ? JSON.parse(raw) : null; }
    catch(e) { _value = null; }
  }
  function save(v) { _value = v; try { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); } catch(e) {} }

  window.tool = {
    getValue: function() { return _value; },
    setValue: function(data) { save(data); listeners.valueChange.forEach(function(cb) { try { cb(data); } catch(e) {} }); },
    onValueChange: function(cb) { listeners.valueChange.push(cb); },
    getFields: function() { return Object.assign({}, _fields); },
    setField: function(id, value) { _fields[id] = value; },
    setFields: function(obj) { Object.assign(_fields, obj); },
    watchField: function(id, cb) { listeners.fieldsChange.push(cb); },
    onFieldsChange: function(cb) { listeners.fieldsChange.push(cb); },
    param: function(name, fallback) {
      var p = (new URLSearchParams(window.location.search)).get(name);
      return p !== null && p !== '' ? p : fallback;
    },
    isReadOnly: function() { return _readOnly; },
    onReadonlyChange: function(cb) { listeners.readonlyChange.push(cb); },
    _setReadOnly: function(v) { _readOnly = v; listeners.readonlyChange.forEach(function(cb) { try { cb(v); } catch(e) {} }); },
    getUser: function() { return _user; },
    onUserChange: function(cb) { listeners.userChange.push(cb); },
    reportValid: function(bool, msg) { if (!bool) console.warn('[Validation]', msg); },
    notify: function(message, severity) {
      severity = severity || 'info';
      var colors = { info: '#0d9488', success: '#16a34a', warning: '#d97706', error: '#dc2626' };
      var toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;background:' + (colors[severity] || '#333') + ';color:#fff;padding:10px 20px;border-radius:6px;font-family:system-ui;font-size:13px;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:toolFadeIn .3s ease;max-width:400px;';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() { toast.style.opacity = '0'; toast.style.transition = 'opacity .3s'; setTimeout(function() { toast.remove(); }, 300); }, 2500);
    },
    resize: function() {},
    declareOutput: function() {},
    declareParams: function() {},
    onReady: function(cb) { load(); cb(_value, _fields); },
    _loadSampleData: function(data) { save(data); window.location.reload(); },
    _clearData: function() { localStorage.removeItem(STORAGE_KEY); window.location.reload(); },
    _toggleReadOnly: function() { this._setReadOnly(!_readOnly); },
    _dump: function() { console.log('GrantPlanner DB:', JSON.parse(JSON.stringify(_value))); },

    // AI & Upload mock implementations for testing
    requestAI: function(prompt, context, callback) {
      console.log('[MOCK AI] Prompt:', prompt.slice(0, 100) + '...');
      // Simulate AI response with grant-specific questions
      setTimeout(function() {
        var sampleQuestions = [
          'Describe your organization\'s experience and capacity to deliver this project. Include specific examples of past work, team qualifications, and relevant partnerships.',
          'What is the detailed project timeline with key milestones? Break down implementation into phases with specific dates and deliverables.',
          'How will you measure and evaluate project success? Provide specific metrics, data collection methods, and reporting frequency.',
          'Describe your budget in detail. Justify each major expense category and explain how costs were estimated.',
          'What community engagement strategies will you employ? How will you ensure the target population is reached and served effectively?',
          'Identify risks to project success and your mitigation strategies. Consider operational, financial, and external risks.',
          'What is your sustainability plan beyond the grant period? How will the project continue or its impact be maintained?',
          'Describe your organization\'s governance structure and financial management capacity. How do you ensure accountability and transparency?'
        ];
        callback(null, JSON.stringify(sampleQuestions));
      }, 600);
    },

    requestUpload: function(accept, callback) {
      // Simulate file picker
      var mockFile = { name: 'grant-call-document.pdf', url: 'https://example.org/mock/grant-call.pdf', size: 245000, type: 'application/pdf' };
      console.log('[MOCK UPLOAD] Accept:', accept, 'Returning:', mockFile.name);
      setTimeout(function() { callback(null, mockFile); }, 400);
    },

    requestFileContent: function(fileUrl, callback) {
      // Simulate file content extraction
      console.log('[MOCK FILE CONTENT] Reading:', fileUrl);
      setTimeout(function() {
        callback(null, 'MOCK FILE CONTENT: This grant call seeks applications for community health initiatives. Applicants must demonstrate organizational capacity, provide detailed budgets, describe evaluation methods, and show sustainability plans. Priority given to projects serving underserved populations with evidence-based interventions.');
      }, 300);
    }
  };

  document.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'R') { e.preventDefault(); window.tool._toggleReadOnly(); window.tool.notify(window.tool.isReadOnly() ? 'READ-ONLY MODE' : 'EDIT MODE', 'info'); }
    if (e.ctrlKey && e.shiftKey && e.key === 'D') { e.preventDefault(); window.tool._dump(); window.tool.notify('DB dumped to console', 'info'); }
  });
})();
</script>
